<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentorix AI — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f8f7ff;
      --surface:      #ffffff;
      --border:       #e8e3f5;
      --border-dark:  #c4b8e8;
      --purple:       #6c3bce;
      --purple-dark:  #4c1d95;
      --purple-light: #ede9fe;
      --black:        #0f0a1e;
      --text:         #1a1030;
      --muted:        #6b7280;
      --green:        #059669;
      --red:          #dc2626;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .bg-dots {
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, #c4b8e8 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.3; pointer-events: none;
    }

    .auth-card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 8px 32px rgba(108,59,206,0.08);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px; justify-content: center;
    }

    .logo-mark {
      width: 38px; height: 38px;
      background: var(--purple); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 19px; color: #fff;
      box-shadow: 0 4px 12px rgba(108,59,206,0.35);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 20px; color: var(--black);
    }
    .logo-text em { font-style: normal; color: var(--purple); }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px;
      background: var(--purple-light);
      border-radius: 10px; padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1; padding: 9px;
      border: none; border-radius: 7px;
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.18s;
      background: transparent; color: var(--muted);
    }

    .tab-btn.active {
      background: var(--purple); color: #fff;
      box-shadow: 0 3px 10px rgba(108,59,206,0.3);
    }

    /* Form */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 800;
      color: var(--black); margin-bottom: 6px;
    }

    .form-sub {
      font-size: 13px; color: var(--muted);
      margin-bottom: 24px; line-height: 1.5;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block; margin-bottom: 6px;
      font-size: 11px; font-weight: 600;
      color: var(--black); text-transform: uppercase; letter-spacing: 0.5px;
    }

    .field input {
      width: 100%; padding: 11px 14px;
      background: #faf9ff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text);
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(108,59,206,0.12);
    }

    .field input::placeholder { color: #bbb; }

    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--purple); color: #fff;
      border: none; border-radius: 11px;
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 5px 18px rgba(108,59,206,0.3);
    }

    .submit-btn:hover {
      background: var(--purple-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,59,206,0.4);
    }

    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Feedback */
    .feedback {
      margin-top: 14px; padding: 10px 14px;
      border-radius: 8px; font-size: 13px;
      display: none; line-height: 1.5;
    }

    .feedback.error {
      background: #fef2f2; border: 1px solid #fca5a5;
      color: var(--red); display: block;
    }

    .feedback.success {
      background: #ecfdf5; border: 1px solid #6ee7b7;
      color: var(--green); display: block;
    }

    /* Password strength */
    .pw-strength {
      margin-top: 6px; height: 3px;
      border-radius: 999px; background: var(--border);
      overflow: hidden;
    }

    .pw-fill {
      height: 100%; width: 0%;
      border-radius: inherit;
      transition: width 0.3s, background 0.3s;
    }

    .pw-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
      margin-top: 4px;
    }

    /* Footer */
    .auth-footer {
      text-align: center; margin-top: 20px;
      font-size: 11px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<!-- Vercel Analytics tracking script -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

<body>
  <div class="bg-dots"></div>

  <div class="auth-card">
    <div class="logo">
      <div class="logo-mark">M</div>
      <span class="logo-text">Mentorix <em>AI</em></span>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="loginSection">
      <h2 class="form-title">Welcome back</h2>
      <p class="form-sub">Sign in to access your behavioral career analysis.</p>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Sign In →</button>
      <div class="feedback" id="loginFeedback"></div>
    </div>

    <!-- REGISTER -->
    <div class="form-section" id="registerSection">
      <h2 class="form-title">Create account</h2>
      <p class="form-sub">Join Mentorix AI and start tracking your career trajectory.</p>

      <div class="field">
        <label>Your Name <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input type="text" id="regName" placeholder="Darx">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password <span style="color:var(--muted);font-weight:400">(min 6 chars)</span></label>
        <input type="password" id="regPassword" placeholder="••••••••"
               autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
        <div class="pw-strength"><div class="pw-fill" id="pwFill"></div></div>
        <div class="pw-label" id="pwLabel"></div>
      </div>

      <button class="submit-btn" id="registerBtn" onclick="handleRegister()">Create Account →</button>
      <div class="feedback" id="registerFeedback"></div>
    </div>

    <div class="auth-footer">Mentorix AI · Behavioral Career Intelligence</div>
  </div>

  <script>
    // ── API URL (same logic as script.js) ──────────────────────
    function getApiBaseUrl() {
      const h = window.location.hostname;
      if (h.includes("github.dev") || h.includes("app.github.dev")) {
        const swapped = h.replace(/-5500\./, "-8000.").replace(/-5500-/, "-8000-");
        if (swapped !== h) return `https://${swapped}`;
      }
      if (h === "localhost" || h === "127.0.0.1") return "http://127.0.0.1:8000";
      return "https://mentorix-ai-backend.onrender.com";
    }

    const API = getApiBaseUrl();

    // ── Tab switching ──────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll(".tab-btn").forEach((b, i) => {
        b.classList.toggle("active", (i === 0) === (tab === "login"));
      });
      document.getElementById("loginSection").classList.toggle("active", tab === "login");
      document.getElementById("registerSection").classList.toggle("active", tab === "register");
      clearFeedback();
    }

    function clearFeedback() {
      ["loginFeedback", "registerFeedback"].forEach(id => {
        const el = document.getElementById(id);
        el.className = "feedback"; el.textContent = "";
      });
    }

    function showFeedback(id, message, type) {
      const el = document.getElementById(id);
      el.textContent = message;
      el.className = `feedback ${type}`;
    }

    // ── Password strength ──────────────────────────────────────
    function checkPasswordStrength(pw) {
      const fill  = document.getElementById("pwFill");
      const label = document.getElementById("pwLabel");
      let strength = 0;
      if (pw.length >= 6)  strength++;
      if (pw.length >= 10) strength++;
      if (/[A-Z]/.test(pw)) strength++;
      if (/[0-9]/.test(pw)) strength++;
      if (/[^A-Za-z0-9]/.test(pw)) strength++;
      const pct   = (strength / 5) * 100;
      const color = strength <= 1 ? "#dc2626" : strength <= 3 ? "#d97706" : "#059669";
      const text  = strength <= 1 ? "Weak" : strength <= 3 ? "Medium" : "Strong";
      fill.style.width      = pct + "%";
      fill.style.background = color;
      label.textContent     = pw.length > 0 ? text : "";
      label.style.color     = color;
    }

    // ── Login ──────────────────────────────────────────────────
    async function handleLogin() {
      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const btn      = document.getElementById("loginBtn");

      if (!email || !password) {
        showFeedback("loginFeedback", "Please enter your email and password.", "error");
        return;
      }

      btn.disabled = true; btn.textContent = "Signing in...";

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Login failed");

        localStorage.setItem("mentorix_token", data.token);
        localStorage.setItem("mentorix_email", data.email);
        localStorage.setItem("mentorix_name",  data.name);

        showFeedback("loginFeedback", `Welcome back, ${data.name}! Redirecting...`, "success");
        setTimeout(() => { window.location.href = "index.html"; }, 1000);

      } catch (err) {
        showFeedback("loginFeedback", err.message, "error");
      } finally {
        btn.disabled = false; btn.textContent = "Sign In →";
      }
    }

    // ── Register ───────────────────────────────────────────────
    async function handleRegister() {
      const name     = document.getElementById("regName").value.trim();
      const email    = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;
      const btn      = document.getElementById("registerBtn");

      if (!email || !password) {
        showFeedback("registerFeedback", "Please fill in email and password.", "error");
        return;
      }
      if (password.length < 6) {
        showFeedback("registerFeedback", "Password must be at least 6 characters.", "error");
        return;
      }

      btn.disabled = true; btn.textContent = "Creating account...";

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, name })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Registration failed");

        localStorage.setItem("mentorix_token", data.token);
        localStorage.setItem("mentorix_email", data.email);
        localStorage.setItem("mentorix_name",  data.name);

        showFeedback("registerFeedback", `Account created! Welcome, ${data.name}. Redirecting...`, "success");
        setTimeout(() => { window.location.href = "assessment.html"; }, 1200);

      } catch (err) {
        showFeedback("registerFeedback", err.message, "error");
      } finally {
        btn.disabled = false; btn.textContent = "Create Account →";
      }
    }

    // ── Enter key support ──────────────────────────────────────
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const loginActive = document.getElementById("loginSection").classList.contains("active");
      if (loginActive) handleLogin(); else handleRegister();
    });

    // ── Redirect if already logged in ─────────────────────────
    if (localStorage.getItem("mentorix_token")) {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
