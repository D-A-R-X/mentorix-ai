<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentorix — Admin Setup</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#e0dff5;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{background:#13111f;border:1px solid rgba(124,77,255,0.2);border-radius:16px;
    padding:40px 36px;width:100%;max-width:420px}
  h1{font-size:20px;font-weight:700;margin-bottom:6px;color:#fff}
  p{font-size:13px;color:#6e6888;margin-bottom:28px;line-height:1.6}
  label{display:block;font-size:10px;font-family:monospace;color:#6e6888;
    letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
  input{width:100%;padding:11px 14px;background:#1e1a2e;border:1px solid rgba(124,77,255,0.2);
    border-radius:9px;color:#fff;font-size:14px;outline:none;margin-bottom:16px;
    font-family:system-ui,sans-serif}
  input:focus{border-color:rgba(124,77,255,0.5)}
  button{width:100%;padding:13px;background:#7c4dff;border:none;border-radius:10px;
    color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
  button:hover{background:#5530cc}
  button:disabled{opacity:0.5;cursor:not-allowed}
  .result{margin-top:20px;padding:14px 16px;border-radius:9px;font-size:13px;
    font-family:monospace;word-break:break-all;display:none;line-height:1.6}
  .result.ok{background:rgba(0,229,180,0.08);border:1px solid rgba(0,229,180,0.25);color:#00e5b4}
  .result.err{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25);color:#ff4d6d}
</style>
</head>
<body>
<div class="box">
  <h1>Admin Account Setup</h1>
  <p>One-time tool to create or reset the admin account in the database. Delete this file after use.</p>

  <label>Secret Key</label>
  <input id="secret" type="password" value="mentorix-setup-2025">

  <label>Admin Email</label>
  <input id="email" type="email" value="admin@mentorix.ai">

  <label>Password</label>
  <input id="password" type="text" value="mentorix@cronix2025">

  <label>Display Name</label>
  <input id="name" type="text" value="Admin">

  <button id="btn" onclick="setup()">Create Admin Account</button>
  <div class="result" id="result"></div>
</div>
<script>
async function setup(){
  const btn=document.getElementById("btn");
  const res=document.getElementById("result");
  btn.disabled=true; btn.textContent="Creating...";
  res.style.display="none";
  try{
    const r=await fetch("https://mentorix-ai-backend.onrender.com/admin/setup",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        secret:document.getElementById("secret").value,
        email:document.getElementById("email").value,
        password:document.getElementById("password").value,
        name:document.getElementById("name").value
      })
    });
    const d=await r.json();
    if(r.ok){
      res.className="result ok";
      res.innerHTML="✓ "+d.message+"<br><br>You can now log into <b>cronix-admin.html</b> with these credentials.";
    } else {
      res.className="result err";
      res.textContent="Error: "+(d.detail||JSON.stringify(d));
    }
  }catch(e){
    res.className="result err";
    res.textContent="Network error — backend may be waking up. Wait 30s and retry.\n"+e.message;
  }
  res.style.display="block";
  btn.disabled=false; btn.textContent="Create Admin Account";
}
</script>
</body>
</html>
