<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentorix AI — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0914;--surface:#120f1e;--surface2:#1a1530;
      --border:rgba(108,59,206,0.18);--border-light:rgba(108,59,206,0.08);
      --purple:#7c4dff;--purple-dim:#5b35c0;--purple-glow:rgba(124,77,255,0.15);
      --accent:#00e5b4;--white:#f0ecff;--muted:#7a748e;--text:#d4cee8;
      --low:#00e5b4;--medium:#ffb347;--high:#ff5f6d;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
    .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.1}
    .orb1{width:600px;height:600px;background:var(--purple);top:-200px;left:-100px}
    .orb2{width:400px;height:400px;background:var(--accent);bottom:-100px;right:-100px}
    .orb3{width:300px;height:300px;background:#c026d3;top:50%;left:50%;transform:translate(-50%,-50%)}

    /* ── Header ── */
    .site-header{position:sticky;top:0;z-index:100;background:rgba(11,9,20,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .header-inner{max-width:1100px;margin:0 auto;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-mark{width:34px;height:34px;background:var(--purple);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;box-shadow:0 0 20px rgba(124,77,255,0.4)}
    .logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--white)}
    .logo-text em{font-style:normal;color:var(--purple)}
    .header-nav{display:flex;align-items:center;gap:10px}
    .nav-pill{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 14px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;text-decoration:none;transition:all 0.2s;white-space:nowrap}
    .nav-pill:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-glow)}
    .nav-pill.cta{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 0 16px rgba(124,77,255,0.35)}
    .nav-pill.cta:hover{background:var(--purple-dim)}
    .user-chip{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
    .user-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse-dot 2s ease infinite}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}

    /* ── Page ── */
    .page{max-width:1100px;margin:0 auto;padding:40px 32px 100px;position:relative;z-index:1}

    /* ── Hero Banner ── */
    .hero-banner{display:grid;grid-template-columns:1fr auto;align-items:center;gap:24px;background:linear-gradient(135deg,var(--surface) 0%,#1a1040 100%);border:1px solid var(--border);border-radius:20px;padding:32px 36px;margin-bottom:28px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease both}
    .hero-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(124,77,255,0.12) 0%,transparent 70%);pointer-events:none}
    .hero-greeting{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
    .hero-name{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--white);line-height:1.15;margin-bottom:10px}
    .hero-sub{font-size:14px;color:var(--muted);font-weight:300;line-height:1.7;max-width:540px}
    .hero-stats{display:flex;gap:28px;flex-wrap:wrap;flex-shrink:0}
    .hero-stat{text-align:center;min-width:72px}
    .hero-stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--white);line-height:1;margin-bottom:4px}
    .hero-stat-val.Low{color:var(--low);text-shadow:0 0 20px rgba(0,229,180,0.4)}
    .hero-stat-val.Medium{color:var(--medium);text-shadow:0 0 20px rgba(255,179,71,0.4)}
    .hero-stat-val.High{color:var(--high);text-shadow:0 0 20px rgba(255,95,109,0.4)}
    .hero-stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

    /* ── Grid ── */
    .dash-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s;animation:fadeUp 0.5s ease both}
    .card:hover{border-color:rgba(124,77,255,0.35);box-shadow:0 8px 32px rgba(124,77,255,0.08)}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),transparent);opacity:0;transition:opacity 0.25s}
    .card:hover::before{opacity:1}
    .col4{grid-column:span 4}
    .col5{grid-column:span 5}
    .col6{grid-column:span 6}
    .col7{grid-column:span 7}
    .col8{grid-column:span 8}
    .col12{grid-column:span 12}
    @media(max-width:900px){.col4,.col5,.col6,.col7,.col8,.col12{grid-column:span 12}}
    @media(max-width:600px){.page{padding:24px 16px 80px}.hero-banner{grid-template-columns:1fr}.hero-stats{justify-content:center}}

    /* ── Card label ── */
    .card-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--purple);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .card-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    /* ── Career Snapshot ── */
    .track-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white);margin-bottom:4px}
    .track-sub{font-size:13px;color:var(--muted);font-weight:300;line-height:1.6}
    .risk-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;margin-top:12px}
    .risk-chip.Low{background:rgba(0,229,180,0.1);border:1px solid rgba(0,229,180,0.3);color:var(--low)}
    .risk-chip.Medium{background:rgba(255,179,71,0.1);border:1px solid rgba(255,179,71,0.3);color:var(--medium)}
    .risk-chip.High{background:rgba(255,95,109,0.1);border:1px solid rgba(255,95,109,0.3);color:var(--high)}
    .risk-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .stability-meter{margin-top:18px}
    .stability-meta{display:flex;justify-content:space-between;margin-bottom:6px}
    .stability-meta span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
    .stability-meta strong{color:var(--accent)}
    .meter-track{height:6px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden}
    .meter-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--purple),var(--accent));transition:width 1s cubic-bezier(0.4,0,0.2,1)}
    .insight-box{margin-top:16px;padding:12px 16px;background:var(--purple-glow);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text);font-style:italic;font-weight:300;line-height:1.6}

    /* ── AI Explanation ── */
    .ai-explanation{font-size:14px;line-height:1.85;color:var(--text);white-space:pre-wrap;font-weight:300}
    .latency-chip{margin-top:16px;padding:8px 14px;background:rgba(0,229,180,0.05);border:1px solid rgba(0,229,180,0.15);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}

    /* ── Behavioral Profile ── */
    .view-toggle{display:flex;gap:4px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:20px;width:fit-content}
    .toggle-btn{padding:5px 14px;border-radius:6px;border:none;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;color:var(--muted);background:transparent;transition:all 0.18s}
    .toggle-btn.active{background:var(--purple);color:#fff;box-shadow:0 2px 8px rgba(124,77,255,0.3)}
    .bars-view{display:block}.radar-view{display:none}
    .bars-view.hidden{display:none}.radar-view.active{display:block}
    .profile-bar-row{display:grid;grid-template-columns:110px 1fr 36px;align-items:center;gap:12px;margin-bottom:12px}
    .pb-label{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
    .pb-track{height:7px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden}
    .pb-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--purple),#b08dff);transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
    .pb-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple);font-weight:500;text-align:right}
    .gap-callout{margin-top:16px;padding:12px 16px;background:rgba(255,179,71,0.07);border:1px solid rgba(255,179,71,0.25);border-radius:10px;font-size:12px;color:var(--medium);line-height:1.6;display:none}
    .gap-callout.show{display:block}

    /* ── Stability Profile ── */
    .stability-grid{display:flex;flex-direction:column;gap:12px}
    .stat-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border-light)}
    .stat-row-label{font-size:12px;color:var(--muted);font-weight:300}
    .stat-row-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white)}

    /* ── Courses ── */
    .progress-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
    .prog-stat{text-align:center;padding:12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border-light)}
    .prog-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white);line-height:1;margin-bottom:3px}
    .prog-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase}
    .prog-bar-track{height:4px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden;margin-top:6px}
    .prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--accent));border-radius:inherit;transition:width 1s ease}
    .course-list{display:flex;flex-direction:column;gap:10px}
    .course-item{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--surface2);border:1px solid var(--border-light);border-radius:12px;transition:all 0.2s}
    .course-item:hover{border-color:var(--purple)}
    .course-num{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:rgba(124,77,255,0.3);min-width:26px}
    .course-info{flex:1;min-width:0}
    .course-title{font-size:13px;font-weight:500;color:var(--white);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .course-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
    .course-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .course-link{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--purple);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:5px;transition:all 0.18s;white-space:nowrap}
    .course-link:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
    .track-btn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all 0.18s;white-space:nowrap;color:var(--muted)}
    .track-btn:hover{color:var(--low);border-color:var(--low)}
    .track-btn.status-completed{color:var(--low);border-color:var(--low);background:rgba(0,229,180,0.08)}

    /* ── Timeline ── */
    .timeline-empty{text-align:center;padding:32px 0;font-size:13px;color:var(--muted);font-weight:300;line-height:1.8}
    .timeline-empty span{font-size:28px;display:block;margin-bottom:10px}
    .timeline-list{display:flex;flex-direction:column}
    .timeline-item{display:grid;grid-template-columns:72px 1fr 80px 72px;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border-light);font-size:12px;transition:background 0.18s}
    .timeline-item:last-child{border-bottom:none}
    .timeline-item:hover{background:var(--surface2);border-radius:8px}
    .tl-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
    .tl-track{color:var(--white);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tl-risk{font-family:'JetBrains Mono',monospace;font-size:10px}
    .tl-risk.Low{color:var(--low)}.tl-risk.Medium{color:var(--medium)}.tl-risk.High{color:var(--high)}
    .tl-score{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-align:right}

    /* ── Empty state ── */
    .empty-state{text-align:center;padding:60px 20px;animation:fadeUp 0.5s ease both}
    .empty-icon{font-size:48px;margin-bottom:16px}
    .empty-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--white);margin-bottom:8px}
    .empty-sub{font-size:14px;color:var(--muted);font-weight:300;line-height:1.6;max-width:400px;margin:0 auto 24px}
    .empty-btn{display:inline-block;padding:13px 28px;background:var(--purple);color:#fff;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-decoration:none;box-shadow:0 5px 20px rgba(124,77,255,0.35);transition:all 0.2s}
    .empty-btn:hover{background:var(--purple-dim);transform:translateY(-2px)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>

<!-- Chatbot Button -->
<button class="chat-fab" id="chatFab" onclick="toggleChat()" title="Ask Mentorix">
  <span id="chatFabIcon">💬</span>
</button>

<!-- Chatbot Panel -->
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div class="chat-header-info">
      <div class="chat-avatar">M</div>
      <div>
        <div class="chat-title">Mentorix Guide</div>
        <div class="chat-subtitle">Ask me anything about your career scan</div>
      </div>
    </div>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg bot">
      <div class="chat-bubble">
        Hey! I'm your Mentorix guide. I can help you understand your scan results, explain what your scores mean, or suggest what to focus on next. What would you like to know?
      </div>
    </div>
  </div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" type="text" placeholder="Ask about your results..."
      onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">→</button>
  </div>
</div>

<style>
/* ── Chatbot ─────────────────────────────────────────────────── */
.chat-fab{
  position:fixed;bottom:28px;right:28px;z-index:200;
  width:52px;height:52px;border-radius:50%;
  background:var(--purple);border:none;cursor:pointer;
  font-size:22px;box-shadow:0 4px 20px rgba(124,77,255,0.45);
  transition:transform 0.2s,box-shadow 0.2s;
  display:flex;align-items:center;justify-content:center;
}
.chat-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(124,77,255,0.6)}

.chat-panel{
  position:fixed;bottom:92px;right:28px;z-index:200;
  width:340px;max-height:500px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;display:flex;flex-direction:column;
  box-shadow:0 16px 48px rgba(0,0,0,0.4);
  transform:scale(0.92) translateY(10px);opacity:0;
  pointer-events:none;transition:all 0.22s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden;
}
.chat-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all}

.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,var(--surface) 0%,#1a1040 100%);
}
.chat-header-info{display:flex;align-items:center;gap:10px}
.chat-avatar{
  width:34px;height:34px;border-radius:10px;
  background:var(--purple);display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;
  box-shadow:0 0 12px rgba(124,77,255,0.4);
}
.chat-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white)}
.chat-subtitle{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.chat-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;transition:color 0.15s}
.chat-close:hover{color:var(--white)}

.chat-messages{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.chat-msg{display:flex}
.chat-msg.user{justify-content:flex-end}
.chat-bubble{
  max-width:82%;padding:10px 14px;border-radius:12px;
  font-size:13px;line-height:1.6;font-weight:300;
}
.chat-msg.bot .chat-bubble{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-bottom-left-radius:4px;
}
.chat-msg.user .chat-bubble{
  background:var(--purple);color:#fff;
  border-bottom-right-radius:4px;
}
.chat-typing .chat-bubble{color:var(--muted);font-style:italic}

.chat-input-row{
  display:flex;gap:8px;padding:12px;
  border-top:1px solid var(--border);
}
.chat-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:9px 13px;font-size:13px;
  color:var(--white);font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color 0.18s;
}
.chat-input:focus{border-color:var(--purple)}
.chat-input::placeholder{color:var(--muted)}
.chat-send{
  width:36px;height:36px;border-radius:8px;
  background:var(--purple);border:none;cursor:pointer;
  color:#fff;font-size:16px;transition:background 0.18s;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.chat-send:hover{background:var(--purple-dim)}

@media(max-width:400px){
  .chat-panel{width:calc(100vw - 32px);right:16px}
  .chat-fab{right:16px;bottom:16px}
}
</style>

<script>
let chatOpen = false;
let chatHistory = [];

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById("chatPanel").classList.toggle("open", chatOpen);
  document.getElementById("chatFabIcon").textContent = chatOpen ? "✕" : "💬";
  if (chatOpen) document.getElementById("chatInput").focus();
}

function getChatContext() {
  const d = JSON.parse(localStorage.getItem("mentorix_last_result") || "{}");
  if (!d.risk_level) return "The user has not completed a scan yet.";

  const scores = d.assessment_scores || {};
  const scoreText = Object.entries(scores)
    .map(([k, s]) => `${k}: ${s.normalized || 0}/5`).join(", ");
  const rec = d.recommendation || {};

  return `User's Mentorix scan data:
- Risk Level: ${d.risk_level}
- Stability: ${d.stability_index ? (d.stability_index * 100).toFixed(1) + "%" : "unknown"}
- Trend: ${d.trend || "unknown"}
- Recommended Track: ${(rec.track || "unknown").replace(/_/g, " ")}
- Career Direction: ${d.career_direction || "unknown"}
- Domain Scores: ${scoreText || "not available"}
- Sessions completed: ${(d.history || []).length}
- AI Explanation: ${d.ai_explanation || "not available"}`;
}

async function sendChat() {
  const input = document.getElementById("chatInput");
  const msg   = input.value.trim();
  if (!msg) return;

  input.value = "";
  appendMessage("user", msg);
  chatHistory.push({ role: "user", content: msg });

  // Typing indicator
  const typingId = appendMessage("bot", "...", true);

  try {
    const context = getChatContext();
    const systemPrompt = `You are Mentorix Guide, the intelligent in-app assistant for the Mentorix AI career platform. You have full knowledge of the user and the app.

USER PROFILE:
- Name: ${localStorage.getItem("mentorix_name")||"User"}
- Profile: ${localStorage.getItem("mentorix_profile")||"Not set"}
- Last session: ${localStorage.getItem("mentorix_last_result")?"Written scan completed":"No written scan yet"}

async function fetchChatReply(userMsg, systemPrompt) {
  const res = await fetch(`${API}/chat`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${localStorage.getItem("mentorix_token")}`
    },
    body: JSON.stringify({
      message: userMsg,
      system:  systemPrompt,
      history: chatHistory.slice(-6)
    })
  });
  if (!res.ok) throw new Error("Chat failed");
  const data = await res.json();
  return data.reply || "I couldn't generate a response. Try again.";
}

let msgCounter = 0;
function appendMessage(role, text, isTyping = false) {
  const id  = `msg-${++msgCounter}`;
  const box = document.getElementById("chatMessages");
  const div = document.createElement("div");
  div.className = `chat-msg ${role}${isTyping ? " chat-typing" : ""}`;
  div.id = id;
  div.innerHTML = `<div class="chat-bubble">${text.replace(/\n/g, "<br>")}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return id;
}

function removeMessage(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

      return"https://mentorix-ai-backend.onrender.com";

    const API=getApiBaseUrl();

    function getUserName(){return localStorage.getItem("mentorix_name")||"User";}
    function logout(){["mentorix_token","mentorix_email","mentorix_name","mentorix_last_result"].forEach(k=>localStorage.removeItem(k));window.location.href="login.html";}

    async function loadCourseProgress(){
      try{
        const res=await fetch(`${API}/courses/progress`,{headers:authHeaders()});
        if(!res.ok)return{};
        const data=await res.json();
        courseProgressData={};
        (data.completions||[]).forEach(c=>{courseProgressData[c.course_url]=c.status;});
        return data.stats||{};
      }catch(e){return{};}
    }

    async function trackCourse(courseTitle,courseUrl,provider,track,status){
      try{
        await fetch(`${API}/courses/track`,{
          method:"POST",headers:authHeaders(),
          body:JSON.stringify({course_title:courseTitle,course_url:courseUrl,provider,track,status})
        });
        courseProgressData[courseUrl]=status;
        const encodedUrl=btoa(courseUrl).replace(/[^a-zA-Z0-9]/g,"");
        const doneBtn=document.getElementById(`done-${encodedUrl}`);
        if(doneBtn){doneBtn.className="track-btn status-completed";doneBtn.textContent="✅ Done";}
        updateProgressDisplay();
      }catch(e){console.error("track failed",e);}
    }

    function updateProgressDisplay(){
      const vals=Object.values(courseProgressData);
      const completed=vals.filter(s=>s==="completed").length;
      const started=vals.filter(s=>s==="started").length;

      const pct=total?Math.round((completed/total)*100):0;
      const el=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
      el("progCompleted",completed);el("progStarted",started);el("progPct",pct+"%");
      const f=document.getElementById("progFill");if(f)f.style.width=pct+"%";

    function renderProfileBars(scores){
  const labels={tech:"Tech",core:"Core Eng",management:"Management",confidence:"Confidence",decision_style:"Decision"};
  if(!scores||!Object.keys(scores).length) return`
    <div style="text-align:center;padding:24px 0">
      <div style="font-size:13px;color:var(--muted);font-weight:300;line-height:1.8">
        Behavioral profile available after your next scan.<br>
        
      </div>
    </div>`;
  return Object.entries(scores).map(([k,s])=>{
    const val=s.normalized||0,pct=(val/5)*100;
    return`<div class="profile-bar-row">
      <span class="pb-label">${labels[k]||k}</span>
      <div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div>
      <span class="pb-val">${val}/5</span>

  }).join("");
}

    function renderCourses(courses,track){
      if(!courses||!courses.length)return'<p style="font-size:13px;color:var(--muted)">No courses found.</p>';
      return courses.map((c,i)=>{
        const encodedUrl=btoa(c.url).replace(/[^a-zA-Z0-9]/g,"");

        const certBadge=c.certificate?`<span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);border:1px solid rgba(0,229,180,0.3);padding:2px 6px;border-radius:4px;margin-left:6px">CERT</span>`:"";
        const safeTitle=c.title.replace(/'/g,"&#39;").replace(/"/g,"&quot;");
        const safeProvider=c.provider.replace(/'/g,"&#39;");
        return`<div class="course-item">
          <span class="course-num">0${i+1}</span>
          <div class="course-info">
            <div class="course-title">${c.title}${certBadge}</div>
            <div class="course-meta">${c.provider} · ${c.duration} · ${c.level}</div>
          </div>
          <div class="course-actions">
            <a class="course-link" href="${c.url}" target="_blank" rel="noopener"
               onclick="trackCourse('${safeTitle}','${c.url}','${safeProvider}','${track||"unknown"}','started')">Open →</a>
            <button id="done-${encodedUrl}" class="track-btn ${status==='completed'?'status-completed':''}"

              ${status==="completed"?"✅ Done":"Mark Done"}
            </button>
          </div>
        </div>`;
      }).join("");
    }

    function initRadar(scores){
      const canvas=document.getElementById("radarCanvas");
      if(!canvas||!scores||!Object.keys(scores).length)return;
      const keys=["tech","core","management","confidence","decision_style"];
      const data=keys.map(k=>scores[k]?.normalized||0);
      if(radarChart)radarChart.destroy();
      radarChart=new Chart(canvas,{
        type:"radar",
        data:{
          labels:["Tech","Core","Mgmt","Confidence","Decision"],
          datasets:[{
            label:"Profile",data,
            backgroundColor:"rgba(124,77,255,0.15)",
            borderColor:"#7c4dff",
            pointBackgroundColor:"#7c4dff",
            pointRadius:4,borderWidth:2
          }]
        },
        options:{
          responsive:true,
          plugins:{legend:{display:false}},
          scales:{r:{
            min:0,max:5,
            ticks:{stepSize:1,color:"rgba(255,255,255,0.3)",backdropColor:"transparent",font:{family:"JetBrains Mono",size:9}},
            grid:{color:"rgba(124,77,255,0.12)"},
            angleLines:{color:"rgba(124,77,255,0.12)"},
            pointLabels:{color:"#7a748e",font:{family:"JetBrains Mono",size:10}}

    }

      const bv=document.getElementById("barsView"),rv=document.getElementById("radarView");

        bb.classList.remove("active");rb.classList.add("active");
        if(radarChart)radarChart.update();
      }

      const callout=document.getElementById("gapCallout");

      const techScore=scores.tech?.normalized||0,techInput=inputs.tech_interest||0;

        callout.textContent=`⚡ Identity signal: Assessed tech inclination (${techScore}/5) differs from behavioral pattern (${techInput}/5). Worth reflecting on.`;
        callout.classList.add("show");

      if(!history||history.length<2){

            <span class="tl-risk ${r}">${r}</span>
            <span class="tl-score">${score}</span>

        }).join("")}
      </div>`;
    }

      if(t==="insufficient_data")return"🔭 First Session";

      const scHTML=isHR&&Object.keys(sc).length?
        `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px">`+
        Object.entries(cats).map(([k,l])=>{const v=Math.round(sc[k]||0);return`<div style="background:rgba(13,11,24,0.6);border:1px solid #1a1030;border-radius:12px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:${col(v)};font-family:'Syne',sans-serif">${v}</div><div style="font-size:10px;color:#6b7280;margin-top:3px">${l}</div></div>`;}).join("")+`</div>`:"";

      // AI-generated action items from summary
      const taskLines=(s.summary||"").split("\n").filter(l=>l.trim().startsWith("→")).map(l=>l.replace(/^→/,"").trim());
      const savedTasks=JSON.parse(localStorage.getItem("mentorix_tasks_"+(s.created_at||""))||"{}");
      const tasksHTML=taskLines.length?`
        <div style="background:rgba(13,11,24,0.6);border:1px solid #1a1030;border-radius:14px;padding:20px;margin-bottom:20px">
          <div style="font-family:'Syne',sans-serif;font-weight:600;font-size:11px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px">⚡ ACTION ITEMS</div>`+
          taskLines.map((t,i)=>{const done=savedTasks[i];return`<div id="task-row-${i}" style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(26,16,48,0.5)">
            <div onclick="toggleTask('${s.created_at||""}',${i})" style="width:18px;height:18px;border-radius:4px;border:1px solid ${done?"#059669":"#2a2a3a"};background:${done?"#059669":"transparent"};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;margin-top:1px">${done?"✓":""}</div>
            <div style="font-size:13px;color:${done?"#6b7280":"#c8c2e0"};text-decoration:${done?"line-through":"none"};line-height:1.5">${t}</div>
          </div>`;}).join("")+`</div>`:"";

      // Previous sessions
      const prevHTML=sessions.length>1?
        `<div style="font-family:'Syne',sans-serif;font-size:11px;color:#6b7280;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase">Previous Sessions</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">`+
        sessions.slice(1).map(ps=>`<div style="background:rgba(13,11,24,0.4);border:1px solid #1a1030;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px">
          <div style="font-size:18px">${ps.mode==="hr_interview"?"⚔️":"🎙️"}</div>
          <div style="flex:1">
            <div style="font-size:13px;color:#c8c2e0">${ps.mode==="hr_interview"?"HR Interview":"Voice Session"}</div>
            <div style="font-size:11px;color:#6b7280">${ps.created_at?new Date(ps.created_at).toLocaleDateString("en-IN",{day:"numeric",month:"short"}):""}  ·  ${ps.exchange_count||0} exchanges</div>
          </div>
          ${ps.overall_score?`<div style="font-weight:700;font-family:'Syne',sans-serif;color:${col(ps.overall_score)}">${ps.overall_score}<span style="font-size:10px;color:#6b7280">/100</span></div>`:""}
        </div>`).join("")+`</div>`:"";

      document.getElementById("mainPage").innerHTML=`
        <div style="max-width:780px;margin:0 auto;padding:24px 16px">
          ${profHTML}
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap">
            <div style="font-size:32px">${isHR?"⚔️":"🎙️"}</div>
            <div style="flex:1">
              <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#f0ecff">${isHR?"HR Mode Interview":"Voice Session"}</div>
              <div style="font-size:12px;color:#6b7280;margin-top:3px">${date} · ${s.exchange_count||0} exchanges · ${s.tab_warnings||0} tab violations</div>
            </div>
            ${ov?`<div style="text-align:center;padding:12px 20px;border:1px solid #1a1030;border-radius:12px;background:rgba(13,11,24,0.6)"><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:34px;color:${col(ov)}">${ov}</div><div style="font-size:10px;color:#6b7280;letter-spacing:1px">OVERALL</div></div>`:""}
          </div>
          ${scHTML}
          <div style="background:rgba(13,11,24,0.6);border:1px solid #1a1030;border-radius:14px;padding:20px;margin-bottom:20px">
            <div style="font-family:'Syne',sans-serif;font-weight:600;font-size:11px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">${isHR?"Interview Report":"Session Summary"}</div>
            <div style="font-size:14px;color:#c8c2e0;line-height:1.85;white-space:pre-wrap">${s.summary||"No summary available."}</div>
          </div>
          ${tasksHTML}
          ${prevHTML}
          <div id="honorCard" style="margin-bottom:0"></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px">
            <a href="voice.html" style="padding:10px 18px;border-radius:10px;background:rgba(124,77,255,0.12);border:1px solid rgba(124,77,255,0.25);color:#b08dff;font-size:13px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:600">🎙 New Voice Session</a>
            <a href="hr-mode.html" style="padding:10px 18px;border-radius:10px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.25);color:#e74c3c;font-size:13px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:600">⚔ Retry HR Mode</a>
          </div>
        </div>`;
      loadHonorScore();
    }


    async function loadHonorScore(){
      try{
        const res=await fetch(`${API}/user/honor`,{headers:authHeaders()});
        if(!res.ok) return;
        const data=await res.json();
        const score=data.score||100;
        const events=data.events||[];
        // Update nav pill
        const hn=document.getElementById("honorNav");
        if(hn) hn.textContent=score;
        const pill=document.getElementById("honorPill");
        if(pill) pill.style.color=score>=80?"#059669":score>=50?"#d97706":"#dc2626";
        // Inject honor card into dashboard if mainPage exists
        const mp=document.getElementById("honorCard");
        if(!mp) return;
        const col=score>=80?"#059669":score>=50?"#d97706":"#dc2626";
        const label=score>=80?"EXCELLENT":score>=50?"GOOD STANDING":"NEEDS WORK";
        const eventLabels={
          voice_session_complete:"Voice Session Complete",
          hr_session_complete:"HR Interview Complete",
          course_marked_done:"Course Completed",
          scan_complete:"Written Scan Complete",
          tab_switch_voice:"Tab Switch (Voice)",
          tab_switch_assessment:"Tab Switch (Assessment)",
          hr_tab_violation:"Tab Violation (HR Mode)",
          early_session_exit:"Early Session Exit",
          low_scan_quality:"Low Scan Quality",
          stability_improvement:"Stability Improved",
          streak_30_days:"30-Day Streak"
        };
        mp.innerHTML=`
          <div style="background:rgba(13,11,24,0.6);border:1px solid #1a1030;border-radius:14px;padding:20px;margin-bottom:20px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
              <div style="font-family:'Syne',sans-serif;font-weight:600;font-size:11px;color:#6b7280;letter-spacing:1px;text-transform:uppercase">⭐ Honor Score</div>
              <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:${col}">${score}<span style="font-size:12px;color:#6b7280;font-weight:400">/100</span></div>
            </div>
            <div style="height:6px;background:#1a1030;border-radius:3px;margin-bottom:8px">
              <div style="height:100%;width:${score}%;background:${col};border-radius:3px;transition:width 1s"></div>
            </div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:${col};margin-bottom:${events.length?"16px":"0"}">${label}</div>
            ${events.length?`<div style="font-family:'Syne',sans-serif;font-size:10px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Recent Activity</div>
            <div style="display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto">
            ${events.slice(0,10).map(e=>{
              const d=e.delta>0?"+"+e.delta:e.delta;
              const dc=e.delta>0?"#059669":"#dc2626";
              const dt=e.created_at?new Date(e.created_at).toLocaleDateString("en-IN",{day:"numeric",month:"short"}):"";
              return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(26,16,48,0.4)">
                <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:${dc};min-width:30px">${d}</div>
                <div style="font-size:12px;color:#c8c2e0;flex:1">${eventLabels[e.event_type]||e.event_type}</div>
                <div style="font-size:10px;color:#6b7280">${dt}</div>
              </div>`;
            }).join("")}
            </div>`:""}
          </div>`;
      }catch(e){console.error("honor load failed",e);}
    }

    async function loadDashboard(){
  let stored = localStorage.getItem("mentorix_last_result");

  if(!stored){
    try{
      const res = await fetch(`${API}/user/latest-scan`, {headers: authHeaders()});
      if(res.ok){
        const data = await res.json();
        if(data && data.risk_level){
          stored = JSON.stringify(data);
          localStorage.setItem("mentorix_last_result", stored);
        }
      }
    }catch(e){ console.error("fetch latest scan failed", e); }
  }

  if(!stored){
    try{
      const sr=await fetch(`${API}/user/sessions`,{headers:authHeaders()});
      if(sr.ok){const sd=await sr.json();if(sd.sessions&&sd.sessions.length>0){renderSessionsDashboard(sd.sessions, sd.profile);return;}}
    }catch(e){}
    document.getElementById("mainPage").innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">🧠</div>
        <div class="empty-title">Ready when you are</div>
        <div class="empty-sub">Start with any session to unlock your personalised dashboard.</div>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px">
          <a class="empty-btn" href="voice.html" style="background:rgba(124,77,255,0.15);border:1px solid rgba(124,77,255,0.3);color:#b08dff">🎙 Voice Session</a>
          <a class="empty-btn" href="hr-mode.html" style="background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.3);color:#e74c3c">⚔ HR Mode</a>
          
        </div>
      </div>`;
    return;
  }
  try{
    const result=JSON.parse(stored);
    const progressStats=await loadCourseProgress();
    renderDashboard(result,progressStats);
  }catch(e){
    console.error("dashboard error:",e);
    document.getElementById("mainPage").innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Something went wrong</div>
        <div class="empty-sub">Could not load your dashboard. Try running a new scan.</div>
        
      </div>`;
  }
}

    loadDashboard();
    loadHonorScore();
let historyChartInstance = null;

function initHistoryChart(history) {
  const canvas = document.getElementById("historyChart");
  const noMsg  = document.getElementById("noHistoryMsg");
  if (!canvas) return;

  if (!history || history.length < 2) {
    canvas.style.display = "none";
    if (noMsg) noMsg.style.display = "block";
    return;
  }

  canvas.style.display = "block";
  if (noMsg) noMsg.style.display = "none";

  const reversed = [...history].reverse();
  const labels   = reversed.map((h, i) => {
    const d = h.created_at ? new Date(h.created_at) : null;
    return d ? d.toLocaleDateString("en-IN", { day: "numeric", month: "short" }) : `Scan ${i + 1}`;
  });
  const stabilityData = reversed.map(h => parseFloat((h.stability_score * 100).toFixed(1)));

  if (historyChartInstance) historyChartInstance.destroy();

  historyChartInstance = new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Stability %",
        data: stabilityData,
        borderColor: "#7c4dff",
        backgroundColor: "rgba(124,77,255,0.08)",
        pointBackgroundColor: "#7c4dff",
        pointRadius: 5,
        pointHoverRadius: 7,
        borderWidth: 2,
        tension: 0.4,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` Stability: ${ctx.raw}%`
          },
          backgroundColor: "#1a1530",
          borderColor: "rgba(124,77,255,0.3)",
          borderWidth: 1,
          titleColor: "#d4cee8",
          bodyColor: "#7a748e",
        }
      },
      scales: {
        x: {
          grid: { color: "rgba(124,77,255,0.06)" },
          ticks: { color: "#7a748e", font: { family: "JetBrains Mono", size: 10 } }
        },
        y: {
          min: 0, max: 100,
          grid: { color: "rgba(124,77,255,0.06)" },
          ticks: {
            color: "#7a748e",
            font: { family: "JetBrains Mono", size: 10 },
            callback: v => v + "%"
          }
        }
      }
    }
  });
}

function switchChart(type) {
  document.getElementById("stabilityChartBtn").classList.toggle("active", type === "stability");
  document.getElementById("trackChartBtn").classList.toggle("active",    type === "track");

  const history  = JSON.parse(localStorage.getItem("mentorix_last_result") || "{}").history || [];
  const canvas   = document.getElementById("historyChart");
  if (!canvas || history.length < 2) return;

  const reversed = [...history].reverse();
  const labels   = reversed.map((h, i) => {
    const d = h.created_at ? new Date(h.created_at) : null;
    return d ? d.toLocaleDateString("en-IN", { day: "numeric", month: "short" }) : `Scan ${i + 1}`;
  });

  if (historyChartInstance) historyChartInstance.destroy();

  if (type === "stability") {
    initHistoryChart(history);
    return;
  }

  // Track history — show track as colored points
  const trackColors = {
    software_track:    "#7c4dff",
    core_track:        "#00e5b4",
    management_track:  "#ffb347",
    foundation_track:  "#ff5f6d",
  };
  const trackLabels = {
    software_track:    "Software",
    core_track:        "Core Eng",
    management_track:  "Management",
    foundation_track:  "Foundation",
  };
  const tracks    = reversed.map(h => h.track || "unknown");
  const stability = reversed.map(h => parseFloat((h.stability_score * 100).toFixed(1)));
  const colors    = tracks.map(t => trackColors[t] || "#7a748e");

  historyChartInstance = new Chart(canvas, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Stability %",
        data: stability,
        backgroundColor: colors,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: ctx => labels[ctx[0].dataIndex],
            label: ctx => ` ${trackLabels[tracks[ctx.dataIndex]] || tracks[ctx.dataIndex]} — ${ctx.raw}%`
          },
          backgroundColor: "#1a1530",
          borderColor: "rgba(124,77,255,0.3)",
          borderWidth: 1,
          titleColor: "#d4cee8",
          bodyColor: "#7a748e",
        }
      },
      scales: {
        x: {
          grid: { color: "rgba(124,77,255,0.06)" },
          ticks: { color: "#7a748e", font: { family: "JetBrains Mono", size: 10 } }
        },
        y: {
          min: 0, max: 100,
          grid: { color: "rgba(124,77,255,0.06)" },
          ticks: {
            color: "#7a748e",
            font: { family: "JetBrains Mono", size: 10 },
            callback: v => v + "%"
          }
        }
      }
    }
  });
}

  </script>
