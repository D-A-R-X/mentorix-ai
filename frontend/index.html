<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentorix AI — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0914;--surface:#120f1e;--surface2:#1a1530;
      --border:rgba(108,59,206,0.18);--border-light:rgba(108,59,206,0.08);
      --purple:#7c4dff;--purple-dim:#5b35c0;--purple-glow:rgba(124,77,255,0.15);
      --accent:#00e5b4;--accent-dim:rgba(0,229,180,0.12);
      --white:#f0ecff;--muted:#7a748e;--text:#d4cee8;
      --low:#00e5b4;--medium:#ffb347;--high:#ff5f6d;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}

    .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .ambient-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12}
    .orb1{width:600px;height:600px;background:var(--purple);top:-200px;left:-100px}
    .orb2{width:400px;height:400px;background:var(--accent);bottom:-100px;right:-100px}
    .orb3{width:300px;height:300px;background:#c026d3;top:50%;left:50%;transform:translate(-50%,-50%)}

    .site-header{position:sticky;top:0;z-index:100;background:rgba(11,9,20,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .header-inner{max-width:1100px;margin:0 auto;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-mark{width:34px;height:34px;background:var(--purple);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;box-shadow:0 0 20px rgba(124,77,255,0.4)}
    .logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--white)}
    .logo-text em{font-style:normal;color:var(--purple)}
    .header-nav{display:flex;align-items:center;gap:10px}
    .nav-pill{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 14px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;text-decoration:none;transition:all 0.2s;white-space:nowrap}
    .nav-pill:hover,.nav-pill.active{border-color:var(--purple);color:var(--purple);background:var(--purple-glow)}
    .nav-pill.cta{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 0 16px rgba(124,77,255,0.35)}
    .nav-pill.cta:hover{background:var(--purple-dim)}
    .user-chip{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
    .user-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse-dot 2s ease infinite}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}

    .page{max-width:1100px;margin:0 auto;padding:40px 32px 100px;position:relative;z-index:1}

    .hero-banner{display:grid;grid-template-columns:1fr auto;align-items:center;gap:24px;background:linear-gradient(135deg,var(--surface) 0%,#1a1040 100%);border:1px solid var(--border);border-radius:20px;padding:32px 36px;margin-bottom:28px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease both}
    .hero-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(124,77,255,0.12) 0%,transparent 70%);pointer-events:none}
    .hero-greeting{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
    .hero-name{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--white);line-height:1.15;margin-bottom:10px}
    .hero-sub{font-size:14px;color:var(--muted);font-weight:300;line-height:1.6;max-width:480px}
    .hero-stats{display:flex;gap:28px;flex-wrap:wrap}
    .hero-stat{text-align:center;min-width:80px}
    .hero-stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--white);line-height:1;margin-bottom:4px}
    .hero-stat-val.Low{color:var(--low);text-shadow:0 0 20px rgba(0,229,180,0.4)}
    .hero-stat-val.Medium{color:var(--medium);text-shadow:0 0 20px rgba(255,179,71,0.4)}
    .hero-stat-val.High{color:var(--high);text-shadow:0 0 20px rgba(255,95,109,0.4)}
    .hero-stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

    .dash-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s;animation:fadeUp 0.5s ease both}
    .card:hover{border-color:rgba(124,77,255,0.35);box-shadow:0 8px 32px rgba(124,77,255,0.08)}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),transparent);opacity:0;transition:opacity 0.25s}
    .card:hover::before{opacity:1}
    .c4{grid-column:span 4}.c6{grid-column:span 6}.c8{grid-column:span 8}.c12{grid-column:span 12}
    @media(max-width:900px){.c4,.c6,.c8,.c12{grid-column:span 12}}
    @media(max-width:600px){.page{padding:24px 16px 80px}}

    .card-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--purple);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .card-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    .track-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white);margin-bottom:4px}
    .track-sub{font-size:13px;color:var(--muted);font-weight:300;line-height:1.6}
    .risk-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;margin-top:12px}
    .risk-chip.Low{background:rgba(0,229,180,0.1);border:1px solid rgba(0,229,180,0.3);color:var(--low)}
    .risk-chip.Medium{background:rgba(255,179,71,0.1);border:1px solid rgba(255,179,71,0.3);color:var(--medium)}
    .risk-chip.High{background:rgba(255,95,109,0.1);border:1px solid rgba(255,95,109,0.3);color:var(--high)}
    .risk-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

    .stability-meter{margin-top:18px}
    .stability-meta{display:flex;justify-content:space-between;margin-bottom:6px}
    .stability-meta span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
    .stability-meta strong{color:var(--accent)}
    .meter-track{height:6px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden}
    .meter-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--purple),var(--accent));transition:width 1s cubic-bezier(0.4,0,0.2,1)}
    .insight-box{margin-top:16px;padding:12px 16px;background:var(--purple-glow);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text);font-style:italic;font-weight:300;line-height:1.6}

    .view-toggle{display:flex;gap:4px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:20px;width:fit-content}
    .toggle-btn{padding:5px 14px;border-radius:6px;border:none;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;color:var(--muted);background:transparent;transition:all 0.18s}
    .toggle-btn.active{background:var(--purple);color:#fff;box-shadow:0 2px 8px rgba(124,77,255,0.3)}
    .bars-view{display:block}.radar-view{display:none}
    .bars-view.hidden{display:none}.radar-view.active{display:block}
    .profile-bar-row{display:grid;grid-template-columns:110px 1fr 30px;align-items:center;gap:12px;margin-bottom:12px}
    .pb-label{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
    .pb-track{height:7px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden}
    .pb-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--purple),#b08dff);transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
    .pb-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple);font-weight:500;text-align:right}
    .gap-callout{margin-top:16px;padding:12px 16px;background:rgba(255,179,71,0.07);border:1px solid rgba(255,179,71,0.25);border-radius:10px;font-size:12px;color:var(--medium);line-height:1.6;display:none}
    .gap-callout.show{display:block}

    .stability-grid{display:flex;flex-direction:column;gap:14px}
    .stat-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border-light)}
    .stat-row-label{font-size:13px;color:var(--muted);font-weight:300}
    .stat-row-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white)}

    .course-list{display:flex;flex-direction:column;gap:12px}
    .course-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border-light);border-radius:12px;transition:all 0.2s}
    .course-item:hover{border-color:var(--purple);background:var(--purple-glow)}
    .course-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:rgba(124,77,255,0.3);min-width:28px}
    .course-info{flex:1}
    .course-title{font-size:14px;font-weight:500;color:var(--white);margin-bottom:3px}
    .course-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
    .course-link{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple);text-decoration:none;padding:5px 12px;border:1px solid var(--border);border-radius:6px;white-space:nowrap;transition:all 0.18s}
    .course-link:hover{background:var(--purple);color:#fff;border-color:var(--purple)}

    .timeline-empty{text-align:center;padding:32px 0;font-size:13px;color:var(--muted);font-weight:300;line-height:1.8}
    .timeline-empty span{font-size:28px;display:block;margin-bottom:10px}
    .timeline-list{display:flex;flex-direction:column;gap:0}
    .timeline-item{display:grid;grid-template-columns:80px 1fr 90px 90px;align-items:center;gap:16px;padding:12px 16px;border-bottom:1px solid var(--border-light);font-size:13px;transition:background 0.18s}
    .timeline-item:last-child{border-bottom:none}
    .timeline-item:hover{background:var(--surface2);border-radius:8px}
    .tl-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
    .tl-track{color:var(--white);font-weight:500}
    .tl-risk{font-family:'JetBrains Mono',monospace;font-size:11px}
    .tl-risk.Low{color:var(--low)}.tl-risk.Medium{color:var(--medium)}.tl-risk.High{color:var(--high)}
    .tl-score{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-align:right}

    .empty-state{text-align:center;padding:60px 20px;animation:fadeUp 0.5s ease both}
    .empty-icon{font-size:48px;margin-bottom:16px}
    .empty-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--white);margin-bottom:8px}
    .empty-sub{font-size:14px;color:var(--muted);font-weight:300;line-height:1.6;max-width:400px;margin:0 auto 24px}
    .empty-btn{display:inline-block;padding:13px 28px;background:var(--purple);color:#fff;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-decoration:none;box-shadow:0 5px 20px rgba(124,77,255,0.35);transition:all 0.2s}
    .empty-btn:hover{background:var(--purple-dim);transform:translateY(-2px)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="ambient">
    <div class="ambient-orb orb1"></div>
    <div class="ambient-orb orb2"></div>
    <div class="ambient-orb orb3"></div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="index.html">
        <div class="logo-mark">M</div>
        <span class="logo-text">Mentorix <em>AI</em></span>
      </a>
      <nav class="header-nav">
        <div class="user-chip">
          <div class="user-dot"></div>
          <span id="userLabel">–</span>
        </div>
        <a class="nav-pill" href="assessment.html">Retake Assessment</a>
        <button class="nav-pill cta" onclick="logout()">Sign Out</button>
      </nav>
    </div>
  </header>

  <main class="page" id="mainPage"></main>

  <script>
    function getApiBaseUrl(){const h=window.location.hostname;if(h.includes("github.dev")||h.includes("app.github.dev")){const s=h.replace(/-5500\./,"-8000.").replace(/-5500-/,"-8000-");if(s!==h)return`https://${s}`;}if(h==="localhost"||h==="127.0.0.1")return"http://127.0.0.1:8000";return"https://mentorix-ai-backend.onrender.com";}
    const API=getApiBaseUrl();
    function getToken(){return localStorage.getItem("mentorix_token");}
    function getUserName(){return localStorage.getItem("mentorix_name")||"User";}
    function logout(){["mentorix_token","mentorix_email","mentorix_name","mentorix_last_result"].forEach(k=>localStorage.removeItem(k));window.location.href="login.html";}
    function authHeaders(){return{"Content-Type":"application/json","Authorization":`Bearer ${getToken()}`};}

    if(!getToken()){window.location.href="login.html";}
    document.getElementById("userLabel").textContent=getUserName();

    let radarChart=null;

    function renderDashboard(result){
      const rec=result.recommendation||{},risk=result.risk_level||"–",name=getUserName();
      const scores=result.assessment_scores||{},inputs=result.engine_inputs||{};
      const history=result.history||[],courses=rec.courses||[];
      const stabilityPct=result.stability_index?(result.stability_index*100).toFixed(1):"–";
      const trackLabel=(rec.track||"–").replace(/_/g," ").replace(/\b\w/g,l=>l.toUpperCase());

      document.getElementById("mainPage").innerHTML=`
        <div class="hero-banner">
          <div>
            <div class="hero-greeting">Career Intelligence Report</div>
            <div class="hero-name">Hey, ${name} 👋</div>
            <div class="hero-sub">${result.summary||"Your behavioral assessment has been analyzed."}</div>
          </div>
          <div class="hero-stats">
            <div class="hero-stat"><div class="hero-stat-val ${risk}">${risk}</div><div class="hero-stat-label">Risk Level</div></div>
            <div class="hero-stat"><div class="hero-stat-val" style="color:var(--accent)">${stabilityPct}%</div><div class="hero-stat-label">Stability</div></div>
            <div class="hero-stat"><div class="hero-stat-val" style="font-size:20px;color:var(--white)">${getTrendEmoji(result.trend)}</div><div class="hero-stat-label">Trend</div></div>
          </div>
        </div>

        <div class="dash-grid">
          <div class="card c4" style="animation-delay:0.05s">
            <div class="card-label">Career Snapshot</div>
            <div class="track-name">${trackLabel}</div>
            <div class="track-sub">${result.career_direction||"–"}</div>
            <div class="risk-chip ${risk}"><span class="risk-dot"></span>${risk} Risk</div>
            <div class="stability-meter">
              <div class="stability-meta"><span>Stability Index</span><strong>${stabilityPct}%</strong></div>
              <div class="meter-track"><div class="meter-fill" id="meterFill" style="width:0%"></div></div>
            </div>
            <div class="insight-box">"${result.insight||"Keep following your plan and reassess periodically."}"</div>
          </div>

          <div class="card c6" style="animation-delay:0.10s">
            <div class="card-label">Behavioral Profile</div>
            <div class="view-toggle">
              <button class="toggle-btn active" id="barsBtn" onclick="switchView('bars')">Bars</button>
              <button class="toggle-btn" id="radarBtn" onclick="switchView('radar')">Radar</button>
            </div>
            <div class="bars-view" id="barsView">${renderProfileBars(scores)}</div>
            <div class="radar-view" id="radarView"><canvas id="radarCanvas" height="220"></canvas></div>
            <div class="gap-callout" id="gapCallout"></div>
          </div>

          <div class="card c4" style="animation-delay:0.15s" id="stabilityCard">
            <div class="card-label">Stability Profile</div>
            <div class="stability-grid">
              <div class="stat-row"><span class="stat-row-label">Trend</span><span class="stat-row-val">${getTrendLabel(result.trend)}</span></div>
              <div class="stat-row"><span class="stat-row-label">Decision Consistency</span><span class="stat-row-val" style="color:${(result.volatility||0)>0.0002?'var(--medium)':'var(--low)'}">${(result.volatility||0)>0.0002?"⚠️ Unstable":"✅ Consistent"}</span></div>
              <div class="stat-row"><span class="stat-row-label">Track Switches</span><span class="stat-row-val">${result.track_flips??0}</span></div>
              <div class="stat-row"><span class="stat-row-label">Sessions</span><span class="stat-row-val">${history.length}</span></div>
            </div>
          </div>

          <div class="card c8" style="animation-delay:0.20s">
            <div class="card-label">Recommended Next Steps</div>
            <div class="course-list">${courses.length?courses.map((c,i)=>`<div class="course-item"><span class="course-num">0${i+1}</span><div class="course-info"><div class="course-title">${c.title}</div><div class="course-meta">${c.provider} · ${c.duration}</div></div><a class="course-link" href="${c.url}" target="_blank" rel="noopener">Start →</a></div>`).join(""):`<p style="font-size:13px;color:var(--muted)">No courses found.</p>`}</div>
          </div>

          <div class="card c12" style="animation-delay:0.25s">
            <div class="card-label">Career Journey</div>
            ${renderTimeline(history)}
          </div>
        </div>
      `;

      requestAnimationFrame(()=>{const f=document.getElementById("meterFill");if(f)f.style.width=(result.stability_index*100).toFixed(1)+"%";});
      initRadar(scores);
      checkPerceptionGap(scores,inputs);
    }

    function renderProfileBars(scores){
      const labels={tech:"Tech",core:"Core Eng",management:"Management",confidence:"Confidence",decision_style:"Decision"};
      if(!scores||!Object.keys(scores).length)return'<p style="font-size:13px;color:var(--muted)">No assessment data.</p>';
      return Object.entries(scores).map(([k,s])=>{const val=s.normalized||0,pct=(val/5)*100;return`<div class="profile-bar-row"><span class="pb-label">${labels[k]||k}</span><div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div><span class="pb-val">${val}/5</span></div>`;}).join("");
    }

    function initRadar(scores){
      const canvas=document.getElementById("radarCanvas");
      if(!canvas||!scores||!Object.keys(scores).length)return;
      const keys=["tech","core","management","confidence","decision_style"];
      const data=keys.map(k=>scores[k]?.normalized||0);
      if(radarChart)radarChart.destroy();
      radarChart=new Chart(canvas,{type:"radar",data:{labels:["Tech","Core Eng","Management","Confidence","Decision"],datasets:[{label:"Your Profile",data,backgroundColor:"rgba(124,77,255,0.15)",borderColor:"#7c4dff",pointBackgroundColor:"#7c4dff",pointRadius:4,borderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{r:{min:0,max:5,ticks:{stepSize:1,color:"rgba(255,255,255,0.3)",backdropColor:"transparent",font:{family:"JetBrains Mono",size:9}},grid:{color:"rgba(124,77,255,0.12)"},angleLines:{color:"rgba(124,77,255,0.12)"},pointLabels:{color:"#7a748e",font:{family:"JetBrains Mono",size:10}}}}}});
    }

    function switchView(view){
      const bv=document.getElementById("barsView"),rv=document.getElementById("radarView");
      const bb=document.getElementById("barsBtn"),rb=document.getElementById("radarBtn");
      if(view==="bars"){bv.classList.remove("hidden");rv.classList.remove("active");bb.classList.add("active");rb.classList.remove("active");}
      else{bv.classList.add("hidden");rv.classList.add("active");bb.classList.remove("active");rb.classList.add("active");if(radarChart)radarChart.update();}
    }

    function checkPerceptionGap(scores,inputs){
      const callout=document.getElementById("gapCallout");
      if(!callout||!scores||!inputs)return;
      const techScore=scores.tech?.normalized||0,techInput=inputs.tech_interest||0;
      const gap=Math.abs(techScore-techInput);
      if(gap>=2){callout.textContent=`⚡ Identity signal: Your assessed tech inclination (${techScore}/5) differs from your behavioral pattern (${techInput}/5). Worth reflecting on.`;callout.classList.add("show");}
    }

    function renderTimeline(history){
      if(!history||history.length<2)return`<div class="timeline-empty"><span>📈</span>Come back after your next assessment to see your career trajectory evolve over time.<br><br><a href="assessment.html" style="color:var(--purple);font-family:'JetBrains Mono',monospace;font-size:12px;">Take another assessment →</a></div>`;
      return`<div class="timeline-list">${[...history].reverse().map(item=>{const risk=item.risk_level||"–",score=typeof item.stability_score==="number"?(item.stability_score*100).toFixed(0)+"%":"–",track=(item.track||"–").replace(/_/g," ").replace(/\b\w/g,l=>l.toUpperCase()),date=item.created_at?new Date(item.created_at).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}):"–";return`<div class="timeline-item"><span class="tl-date">${date}</span><span class="tl-track">${track}</span><span class="tl-risk ${risk}">${risk} Risk</span><span class="tl-score">Stability ${score}</span></div>`;}).join("")}</div>`;
    }

    function getTrendEmoji(t){if(!t)return"–";if(t==="improving")return"📈";if(t==="declining")return"📉";if(t==="stable")return"➡️";return"🔭";}
    function getTrendLabel(t){if(!t)return"–";if(t==="improving")return"📈 Improving";if(t==="declining")return"📉 Declining";if(t==="stable")return"➡️ Stable";if(t==="insufficient_data")return"🔭 First Session";return t;}

    function loadDashboard(){
      const stored=localStorage.getItem("mentorix_last_result");
      if(stored){try{renderDashboard(JSON.parse(stored));return;}catch(e){}}
      document.getElementById("mainPage").innerHTML=`<div class="empty-state"><div class="empty-icon">🧠</div><div class="empty-title">No assessment yet</div><div class="empty-sub">Complete your behavioral assessment to unlock your personalized career intelligence dashboard.</div><a class="empty-btn" href="assessment.html">Start Assessment →</a></div>`;
    }

    loadDashboard();
  </script>
</body>
</html>
